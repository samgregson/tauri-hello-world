name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Frontend dependencies
        run: npm install

      - name: Prepare Embedded Python Environment
        run: npm run setup-python
        shell: bash
        # This script downloads the Windows portable Python and installs fastmcp/pywin32.

      - name: Build with Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Engineering Tools v__VERSION__"
          releaseBody: "Automated release with embedded Python MCP server."
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc
