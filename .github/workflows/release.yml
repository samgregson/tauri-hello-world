name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Frontend dependencies
        run: npm install

      # No embedded Python setup step needed — the app finds and uses the
      # user's system Python at runtime, creating a venv on first launch.

      - name: Build with Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Engineering Tools v__VERSION__"
          releaseBody: |
            Automated release.

            **Requires Python 3.10+** installed on the target machine.
            Download Python from https://python.org — ensure it is added to PATH during installation.
            The app will automatically create an isolated environment and install its dependencies on first use.
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
